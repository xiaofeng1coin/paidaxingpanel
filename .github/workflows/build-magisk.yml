name: Build Android Magisk Module

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-magisk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up QEMU for ARM64
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-user-static rsync zip

    - name: Download and Prepare Alpine Rootfs
      run: |
        mkdir -p magisk-module/alpine
        # 下载官方稳定的 Alpine Linux ARM64 精简包
        wget https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/aarch64/alpine-minirootfs-3.19.1-aarch64.tar.gz
        tar -xvf alpine-minirootfs-3.19.1-aarch64.tar.gz -C magisk-module/alpine
        
        # 复制 QEMU 以支持在 x86 机器上 chroot 到 arm64 系统
        sudo cp /usr/bin/qemu-aarch64-static magisk-module/alpine/usr/bin/

        # 设置 DNS
        sudo cp /etc/resolv.conf magisk-module/alpine/etc/resolv.conf

        # 写入并执行依赖安装脚本 (Python, Nodejs等)
        cat << 'EOF' > magisk-module/alpine/install.sh
        #!/bin/sh
        apk update
        apk add --no-cache python3 py3-pip nodejs npm git tzdata curl bash gcc g++ make linux-headers python3-dev musl-dev libffi-dev
        EOF
        sudo chroot magisk-module/alpine /bin/sh /install.sh

    - name: Copy Application Files
      run: |
        sudo mkdir -p magisk-module/alpine/opt/PatrickPanel
        
        # 将项目源码完整复制到容器内，排除无用文件
        sudo rsync -av --exclude='magisk-module' --exclude='alpine-minirootfs*' --exclude='.git' ./ magisk-module/alpine/opt/PatrickPanel/

        # 在 ARM64 容器内安装 Python pip 依赖
        cat << 'EOF' > magisk-module/alpine/install_pip.sh
        #!/bin/sh
        cd /opt/PatrickPanel
        pip install --no-cache-dir -r requirements.txt gunicorn --break-system-packages
        EOF
        sudo chroot magisk-module/alpine /bin/sh /install_pip.sh

        # 清理临时文件，减小最终包体积
        sudo rm -f magisk-module/alpine/install.sh magisk-module/alpine/install_pip.sh
        sudo rm -f magisk-module/alpine/usr/bin/qemu-aarch64-static
        sudo rm -f alpine-minirootfs-3.19.1-aarch64.tar.gz

    - name: Create Magisk Scripts
      run: |
        # 模块元数据
        cat << 'EOF' > magisk-module/module.prop
        id=patrickpanel
        name=派大星面板 (PatrickPanel)
        version=v1.0.7
        versionCode=107
        author=xiaofeng1coin
        description=支持 Python/Node/Shell 的现代化面板。内置独立 Alpine 环境。数据存储在内部存储 /PatrickPanelData。启动后访问 http://127.0.0.1:5000
        EOF

        # 模块安装脚本
        cat << 'EOF' > magisk-module/customize.sh
        ui_print "- 正在安装 派大星面板 (Alpine ARM64)"
        ui_print "- 面板将以后台独立服务运行"
        ui_print "- 数据将自动存放至手机根目录 /PatrickPanelData"
        set_perm_recursive $MODPATH 0 0 0755 0755
        EOF

        # 面具自启脚本后台运行
        cat << 'EOF' > magisk-module/service.sh
        #!/system/bin/sh
        MODDIR=${0%/*}

        # 等待系统开机挂载内部存储
        until [ -d "/storage/emulated/0/Android" ]; do
            sleep 2
        done

        # 在手机内部存储(普通文件管理器可见)创建数据目录
        EXT_DATA="/storage/emulated/0/PatrickPanelData"
        mkdir -p $EXT_DATA

        # 挂载 Linux 伪文件系统供 chroot 正常运行
        mount -o bind /dev $MODDIR/alpine/dev
        mount -o bind /proc $MODDIR/alpine/proc
        mount -o bind /sys $MODDIR/alpine/sys

        # 将手机内置存储挂载到容器内
        mkdir -p $MODDIR/alpine/sdcard
        mount -o bind /storage/emulated/0 $MODDIR/alpine/sdcard

        # 进入容器环境，定义环境变量并后台启动面板
        chroot $MODDIR/alpine /bin/sh -c "
            export PATH=/usr/bin:/usr/sbin:/bin:/sbin
            export HOME=/root
            export PDX_DATA_DIR=/sdcard/PatrickPanelData
            cd /opt/PatrickPanel
            nohup gunicorn --worker-class gthread --threads 10 --bind 0.0.0.0:5000 --log-level info app:app > /sdcard/PatrickPanelData/boot.log 2>&1 &
        "
        EOF
        chmod +x magisk-module/service.sh

    - name: Get Version from version.json
      id: get_version
      run: |
        VERSION=$(grep '"version"' version.json | cut -d'"' -f4)
        echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Package Magisk Module
      run: |
        cd magisk-module
        zip -r9 ../PatrickPanel-Magisk-v${{ env.APP_VERSION }}.zip .

    - name: Publish to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.APP_VERSION }}-magisk
        name: 派大星面板 Android Magisk 模块 v${{ env.APP_VERSION }}
        files: PatrickPanel-Magisk-v${{ env.APP_VERSION }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}