name: Build Magisk Module

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up QEMU for ARM64
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Prepare Dockerfile for Android Alpine Rootfs
      run: |
        cat << 'EOF' > Dockerfile.magisk
        FROM arm64v8/alpine:3.19
        ENV TZ=Asia/Shanghai
        
        # 安装基础运行环境
        RUN apk update && apk add --no-cache \
            python3 py3-pip nodejs npm tzdata bash git curl shadow sqlite
            
        WORKDIR /app
        COPY requirements.txt .
        
        # 安装Python依赖 (在Alpine中使用--break-system-packages允许全局安装)
        RUN pip install --no-cache-dir --break-system-packages -r requirements.txt
        
        COPY . .
        
        # 清理不必要的文件以减小体积
        RUN rm -rf /var/cache/apk/* && \
            rm -rf /root/.cache
        EOF

    - name: Build and Export Rootfs
      run: |
        # 构建适用于安卓设备的 arm64 架构镜像
        docker buildx build --platform linux/arm64 -t patrickpanel-arm64 -f Dockerfile.magisk --load .
        
        # 创建一个临时容器并导出其纯净的文件系统
        docker create --name temp-container patrickpanel-arm64
        docker export temp-container -o rootfs.tar
        docker rm temp-container
        
        # 使用 xz 进行极限压缩，大幅度减小面具模块体积
        xz -z -9 -T0 rootfs.tar

    - name: Create Magisk Module Structure
      run: |
        mkdir magisk_module
        cd magisk_module
        
        # 1. 移动根文件系统
        mv ../rootfs.tar.xz ./
        
        # 2. 创建 module.prop
        cat << 'EOF' > module.prop
        id=patrick_panel
        name=派大星面板 (PatrickPanel)
        version=v1.0.7
        versionCode=107
        author=xiaofeng1coin
        description=支持Python3/Nodejs的定时任务面板。Data目录位于内部存储根目录下的 PatrickPanel_Data 文件夹。
        EOF
        
        # 3. 创建 customize.sh (面具安装脚本)
        cat << 'EOF' > customize.sh
        #!/system/bin/sh
        SKIPUNZIP=0
        
        ui_print "- 正在解压 Alpine Linux 核心环境 (此过程可能需要1-3分钟，请耐心等待)..."
        mkdir -p $MODPATH/alpine
        tar -xf $MODPATH/rootfs.tar.xz -C $MODPATH/alpine
        rm $MODPATH/rootfs.tar.xz
        
        ui_print "- 核心环境解压完成！"
        ui_print "- 面板数据将安全保存在: /storage/emulated/0/PatrickPanel_Data"
        ui_print "- 重启手机后，浏览器访问 http://127.0.0.1:5000 即可使用"
        EOF
        
        # 4. 创建 service.sh (开机自启与后台运行脚本)
        cat << 'EOF' > service.sh
        #!/system/bin/sh
        MODDIR=${0%/*}
        
        # 等待安卓系统完全启动，确保外部存储已挂载
        until [ $(getprop sys.boot_completed) -eq 1 ]; do
            sleep 2
        done
        sleep 10
        
        # 定义并创建外部可见的公共数据目录
        PUBLIC_DATA_DIR="/storage/emulated/0/PatrickPanel_Data"
        mkdir -p "$PUBLIC_DATA_DIR"
        
        # 挂载必要的内核虚拟文件系统到 chroot 容器内部
        mount -t proc proc "$MODDIR/alpine/proc"
        mount -t sysfs sysfs "$MODDIR/alpine/sys"
        mount -o bind /dev "$MODDIR/alpine/dev"
        mount -o bind /dev/pts "$MODDIR/alpine/dev/pts"
        mount -o bind /etc/resolv.conf "$MODDIR/alpine/etc/resolv.conf"
        
        # 将外部存储的数据目录挂载到容器的 /app/data 中
        mkdir -p "$MODDIR/alpine/app/data"
        mount -o bind "$PUBLIC_DATA_DIR" "$MODDIR/alpine/app/data"
        
        # 使用 chroot 进入环境并后台启动 Flask 面板
        # 传入 ANDROID_DATA_DIR 环境变量通知 app.py 数据目录位置
        chroot "$MODDIR/alpine" /bin/sh -c "
            export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            export ANDROID_DATA_DIR=/app/data
            cd /app
            nohup python3 app.py > /app/data/run.log 2>&1 &
        "
        EOF
        
        # 赋予执行权限
        chmod +x customize.sh service.sh

    - name: Zip Magisk Module
      run: |
        cd magisk_module
        zip -r9 ../PatrickPanel-Magisk-v1.0.7.zip .

    - name: Publish to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: Magisk-v1.0.7
        name: 派大星面板 面具模块 v1.0.7
        files: PatrickPanel-Magisk-v1.0.7.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}